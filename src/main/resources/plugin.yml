name: LoyaltyLogin
version: '1.0'
main: me.loyalty.loyaltylogin.LoyaltyLogin
api-version: '1.21'
author: LoyaltyMC
description: бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҖбһ¶бһҡбһ–бһ¶бһҡбһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ–бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһӣбҹҒбһ„бҹ”
commands:
  register:
    description: бһ…бһ»бҹҮбһҲбҹ’бһҳбҹ„бҹҮбһӣбҹҒбһҒбһҖбһјбһҠбһҹбһҳбҹ’бһ„бһ¶бһҸбҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ Login
    usage: /register <password>
  login:
    description: бһ…бһјбһӣбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһўбһ¶бһҒбҹ„бһ“
    usage: /login <password>
